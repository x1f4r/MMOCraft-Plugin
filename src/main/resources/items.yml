# Definitions for all custom items
items:
  # --- Tree Items ---
  tree_sword:
    material: WOODEN_SWORD
    name: "&aTree Sword"
    lore:
      - "&7A blade forged from the"
      - "&7very essence of the forest."
      - ""
      - "&7Strength: &c+5"
      - "&7Crit Damage: &c+10%"
    unbreakable: true
    attributes:
      GENERIC_ATTACK_DAMAGE: 10.0:ADD_NUMBER:HAND
    custom_stats:
      STRENGTH: 5
      CRIT_DAMAGE: 10

  tree_pickaxe:
    material: WOODEN_PICKAXE
    name: "&aTree Pickaxe"
    lore:
      - "&7Surprisingly sturdy."
      - "&7Mining Speed: &e+100"
    unbreakable: true
    item_flags: [ HIDE_ENCHANTS, HIDE_UNBREAKABLE, HIDE_ATTRIBUTES ]
    attributes: { GENERIC_ATTACK_DAMAGE: 2.0:ADD_NUMBER:HAND }
    custom_stats:
      STRENGTH: 2
      MINING_SPEED: 100

  tree_axe:
    material: WOODEN_AXE
    name: "&aTree Axe"
    lore:
      - "&7Feels weighty."
      - "&7Foraging Speed: &e+100"
    unbreakable: true
    item_flags: [ HIDE_ENCHANTS, HIDE_UNBREAKABLE, HIDE_ATTRIBUTES ]
    attributes: { GENERIC_ATTACK_DAMAGE: 5.0:ADD_NUMBER:HAND }
    custom_stats:
      STRENGTH: 8
      CRIT_CHANCE: 2
      FORAGING_SPEED: 100

  tree_helmet:
    material: LEATHER_HELMET
    name: "&aTree Helmet"
    lore: ["&7Surprisingly protective bark."]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes:
      GENERIC_ARMOR: 2.0:ADD_NUMBER:HEAD
    custom_stats:
      MAX_MANA: 10 # This item adds to player's max mana
      DEFENSE: 5

  tree_chestplate:
    material: LEATHER_CHESTPLATE
    name: "&aTree Chestplate"
    lore: ["&7Heartwood protection."]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes:
      GENERIC_ARMOR: 5.0:ADD_NUMBER:CHEST
    custom_stats:
      MAX_MANA: 20
      STRENGTH: 1
      DEFENSE: 15

  tree_leggings:
    material: LEATHER_LEGGINGS
    name: "&aTree Leggings"
    lore: ["&7Sturdy root bindings."]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes:
      GENERIC_ARMOR: 4.0:ADD_NUMBER:LEGS
    custom_stats:
      MAX_MANA: 15
      DEFENSE: 10

  tree_boots:
    material: LEATHER_BOOTS
    name: "&aTree Boots"
    lore: ["&7Grounded footing."]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes:
      GENERIC_ARMOR: 1.0:ADD_NUMBER:FEET
    custom_stats:
      MAX_MANA: 5
      SPEED: 2
      DEFENSE: 5

  # --- Dragon Items ---
  aspect_of_the_dragons:
    material: NETHERITE_SWORD
    name: "&cAspect of the Dragons"
    lore:
      - "&7The combined essence of powerful dragons."
      - "&7Emits a strong aura."
      - ""
      - "&6Ability: Dragon's Fury &e&lRIGHT CLICK"
      - "&7Unleash a wave of draconic energy."
      - "&cNO COOLDOWN" # Cooldowns should be handled by ability system, not just lore
      - ""
      - "&cStrength: &f+50"
      - "&cCrit Damage: &f+75%"
      - "&aSpeed: &f+5%"
      - ""
      - "&bMana Cost: &3100"
    unbreakable: true
    enchants: { DAMAGE_ALL: 5 , LOOT_BONUS_MOBS: 3 }
    item_flags: [ HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes: { GENERIC_ATTACK_DAMAGE: 10.0:ADD_NUMBER:HAND } # Base vanilla damage
    custom_stats:
      STRENGTH: 50
      CRIT_DAMAGE: 75
      SPEED: 5
      MANA_COST: 100 # For the ability
      ABILITY_ID: "dragon_fury" # Example ability identifier

  aspect_of_the_end:
    material: DIAMOND_SWORD
    name: "&5Aspect of the End"
    lore:
      - "&7A powerful blade that allows you to"
      - "&7instantly teleport short distances."
      - ""
      - "&6Ability: Instant Transmission &e&lRIGHT CLICK"
      - "&7Teleport &a8 blocks &7ahead of you."
      - "&cNO COOLDOWN"
      - "&7Also deals damage when striking."
      - ""
      - "&cStrength: &f+25"
      - "&cCrit Chance: &f+10%"
      - ""
      - "&bMana Cost: &350"
    unbreakable: true
    enchants: { DAMAGE_ALL: 3 }
    item_flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE]
    attributes: { GENERIC_ATTACK_DAMAGE: 6.0:ADD_NUMBER:HAND }
    custom_stats:
      STRENGTH: 25
      CRIT_CHANCE: 10
      CRIT_DAMAGE: 25 # Added for completeness
      MANA_COST: 50
      ABILITY_ID: "instant_transmission"

  # --- End Armor Set ---
  ender_helmet:
    material: DIAMOND_HELMET
    name: "&5Ender Helmet"
    lore:
      - "&7Health: &a+20" # This is from vanilla attribute
      - "&7Defense: &a+35" # This is custom stat
      - ""
      - "&6Full Set Bonus: End Amplification" # Changed to reflect set bonus idea
      - "&7All stats on this armor piece are"
      - "&7multiplied by &c2x &7while on"
      - "&7the End Island!"
      - ""
      - "&5&lEPIC HELMET"
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes: { GENERIC_MAX_HEALTH: 20.0:ADD_NUMBER:HEAD }
    custom_stats: { DEFENSE: 35 }

  ender_chestplate:
    material: DIAMOND_CHESTPLATE
    name: "&5Ender Chestplate"
    lore: ["&7Health: &a+30", "&7Defense: &a+60", "", "&6Full Set Bonus: End Amplification", "", "&5&lEPIC CHESTPLATE"]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes: { GENERIC_MAX_HEALTH: 30.0:ADD_NUMBER:CHEST }
    custom_stats: { DEFENSE: 60 }

  ender_leggings:
    material: DIAMOND_LEGGINGS
    name: "&5Ender Leggings"
    lore: ["&7Health: &a+25", "&7Defense: &a+50", "", "&6Full Set Bonus: End Amplification", "", "&5&lEPIC LEGGINGS"]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes: { GENERIC_MAX_HEALTH: 25.0:ADD_NUMBER:LEGS }
    custom_stats: { DEFENSE: 50 }

  ender_boots:
    material: DIAMOND_BOOTS
    name: "&5Ender Boots"
    lore: ["&7Health: &a+15", "&7Defense: &a+25", "", "&6Full Set Bonus: End Amplification", "", "&5&lEPIC BOOTS"]
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    attributes: { GENERIC_MAX_HEALTH: 15.0:ADD_NUMBER:FEET }
    custom_stats: { DEFENSE: 25 }

  # --- Tree Bow (Juju Style) ---
  tree_bow:
    material: BOW
    name: "&aTree Bow &7(Juju Style)"
    lore:
      - "&7A bow carved from ancient, resilient wood,"
      - "&7humming with untamed forest magic."
      - ""
      - "&6Ability: Instant Shot &e&lRIGHT CLICK"
      - "&7Fires arrows instantly without drawing."
      - "&7Consumes no arrows."
      - ""
      - "&cPower: &fExceptional (Base damage multiplier x6)" # This is custom logic
      - "&bShooting Speed: &e+100 &7(Faster fire rate & projectile speed)"
      - "&7Unbreakable"
    unbreakable: true
    item_flags: [ HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE ]
    custom_stats:
      TREE_BOW_POWER: 6        # Custom NBT for damage calculation
      TREE_BOW_MAGICAL_AMMO: 1 # Custom NBT: 1 = true
      INSTANT_SHOOT_BOW: 1     # Custom NBT: 1 = true for PlayerAbilityListener
      SHOOTING_SPEED: 100      # Custom stat affecting fire rate/projectile speed
      # MANA_COST: 5           # Optional
      ABILITY_ID: "instant_shot_bow"

  # --- Example Fishing Rod ---
  master_angler_rod:
    material: FISHING_ROD
    name: "&bMaster Angler's Rod"
    lore:
      - "&7Legends say this rod can pull fish from"
      - "&7the very fabric of time."
      - ""
      - "&9Fishing Speed: &e+100"
    unbreakable: true
    item_flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE]
    custom_stats:
      FISHING_SPEED: 100

