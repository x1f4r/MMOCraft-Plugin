# MMOCraftNextGen - Custom Item Definitions (items.yml)

items:
  # --- Example Sword ---
  common_sword:
    material: IRON_SWORD
    name: "&fCommon Sword"
    lore:
      - "&7A basic, but reliable weapon."
      - "&7Quality: Common"
    unbreakable: false
    enchants: # Optional
    # SHARPNESS: 1 # Example: EnchantmentName: level
    item_flags: # Optional, list of Bukkit ItemFlag enum names
    # - HIDE_ENCHANTS
    # - HIDE_ATTRIBUTES
    attributes: # Optional: Vanilla Attribute Modifiers
      # BukkitAttributeName: "amount:OPERATION[:EQUIPMENT_SLOT]"
      # Operations: ADD_NUMBER, ADD_SCALAR, MULTIPLY_SCALAR_1
      # EquipmentSlot: HAND, OFF_HAND, FEET, LEGS, CHEST, HEAD (if null, applies when in main hand)
      GENERIC_ATTACK_DAMAGE: "6:ADD_NUMBER:HAND" # Base 6 attack damage when in hand
      GENERIC_ATTACK_SPEED: "-2.0:ADD_NUMBER:HAND" # Slower attack speed (vanilla sword is -2.4)
    custom_stats: # MMOCraft Custom Stats (added to player's calculated stats)
      STRENGTH: 10
      CRIT_CHANCE: 2
    # Ability section will be used in Part 5
    # ability:
    #   id: "simple_slash" # ID of an ItemAbility implementation
    #   mana_cost: 10 # Optional: Override default mana cost for this specific item
    #   cooldown_ticks: 40 # Optional: Override default cooldown
    # custom_ability_nbt: # For ability-specific parameters
    #   SIMPLE_SLASH_EXTRA_DAMAGE: 50

  # --- Example Pickaxe ---
  sturdy_pickaxe:
    material: DIAMOND_PICKAXE
    name: "&bSturdy Pickaxe"
    lore:
      - "&7A well-crafted pickaxe, good for general mining."
      - "&7It hums with a faint energy."
      - ""
      - "&6SPECIAL!"
    unbreakable: false
    enchants:
      EFFICIENCY: 2
    custom_stats:
      MINING_SPEED: 50
      STRENGTH: 5 # Maybe it can be used as a weak weapon too

  # --- Example "Aspect of the End" (for Part 5 ability) ---
  aspect_of_the_end: # From previous example, now fully wired
    material: DIAMOND_SWORD
    name: "&5Aspect of the End"
    lore: [] # Lore will be mostly generated
    unbreakable: true
    item_flags: [HIDE_ATTRIBUTES]
    attributes:
      GENERIC_ATTACK_DAMAGE: "25:ADD_NUMBER:HAND"
    custom_stats:
      STRENGTH: 100
      CRIT_DAMAGE: 25
      SPEED_BONUS_PERCENT: 10
    ability:
      id: "instant_transmission"
      mana_cost: 50
      # cooldown_ticks: 0 # Default is 0 for this ability
    custom_ability_nbt:
      # Parameter key string as expected by CustomItem.getGenericNbtValue and NBTService.getGenericItemNBTKey
      # Matches NBTService.TELEPORT_RANGE_KEY_STRING
      TELEPORT_RANGE: 8 # This will be looked up as "TELEPORT_RANGE" in the CustomItem's genericNbt map

  aspect_of_the_dragons: # Renamed from common_sword for example
    material: NETHERITE_SWORD # Or DIAMOND_SWORD
    name: "&cAspect of the Dragons"
    lore:
      - "&7A powerful blade imbued with draconic might."
      - "&6Item Ability: Dragon's Fury &e&lRIGHT CLICK" # Will be generated by ItemService
      - "&7Unleashes a cone of fire."
      - "&8Mana Cost: &b100"
      - "&8Cooldown: &71.0s"
    unbreakable: true
    item_flags: [ HIDE_ATTRIBUTES ]
    attributes:
      GENERIC_ATTACK_DAMAGE: "35:ADD_NUMBER:HAND"
      GENERIC_ATTACK_SPEED: "-2.2:ADD_NUMBER:HAND" # Slightly faster than default sword
    custom_stats:
      STRENGTH: 150
      CRIT_DAMAGE: 75
      MAX_MANA_BONUS: 50
    ability:
      id: "dragon_fury" # Links to DragonFuryAbility.java
      mana_cost: 100    # This item sets the mana cost
      cooldown_ticks: 20 # This item sets the cooldown (1s)
    custom_ability_nbt: # Parameters for DragonFuryAbility
      # Key names here should be simple and match what the Ability expects (e.g. from NBTService.ABILITY_DAMAGE_PARAM_SUFFIX)
      # ItemService will create NamespacedKey like "mmoc_item_param_ability_damage" from "ABILITY_DAMAGE"
      ABILITY_DAMAGE: 250.0 # Base damage of the ability
      DRAGON_FURY_STRENGTH_SCALING: 0.75 # 75% of player strength added to damage
      ABILITY_RANGE: 7.0 # Range of the cone
      DRAGON_FURY_CONE_ANGLE: 70.0 # Cone angle in degrees

  glacial_scythe:
    material: DIAMOND_HOE # Or NETHERITE_HOE
    name: "&bGlacial Scythe"
    lore: [ ]
    unbreakable: true
    attributes:
      GENERIC_ATTACK_DAMAGE: "15:ADD_NUMBER:HAND"
    custom_stats:
      STRENGTH: 50
      MAX_MANA_BONUS: 150
      CRIT_CHANCE: 10
    ability:
      id: "glacial_ice_bolt" # Links to GlacialScytheBoltAbility.java
      mana_cost: 75
      cooldown_ticks: 60 # 3 seconds
    custom_ability_nbt:
      # Parameter keys matching NBTService string constants (or what GlacialScytheBoltAbility expects)
      ABILITY_DAMAGE: 200 # Damage of the bolt
      ABILITY_EFFECT_DURATION_TICKS: 100 # 5 seconds slow
      ABILITY_EFFECT_AMPLIFIER: 1 # Slowness II (amplifier 1)
      IS_AOE_ON_HIT: true # Boolean, parsed as byte(1) for NBT
      AOE_RADIUS: 3.5 # Double
      AOE_DAMAGE: 100 # Integer, damage for AoE part

    terminator_bow: # Example for InstantShotBowAbility
      material: BOW
      name: "&6Terminator Bow"
      lore:
        - "&7Shoots three arrows at once!" # This is a conceptual part not implemented by InstantShotBowAbility yet
        - "&7Instantly shoots on click."
      unbreakable: true
      enchants:
        POWER: 5 # Example
      custom_stats:
        STRENGTH: 75
        CRIT_DAMAGE: 100
        SHOOTING_SPEED: 100 # High shooting speed reduces cooldown
      ability:
        id: "instant_shot_bow"
        mana_cost: 5 # Low mana cost per shot
        # Cooldown is dynamic, not set here.
      custom_ability_nbt:
        # Parameter for InstantShotBowAbility
        BASE_SHOOT_COOLDOWN_TICKS: 20 # Base cooldown (1s) before Shooting Speed modification
        INSTANT_SHOT_VELOCITY_MULT: 3.5 # Arrow velocity multiplier
        # Example for NBT on bow to be transferred to arrow by ToolInteractionListener
        # Note: These NBT keys must match what NBTService defines for PROJECTILE_DAMAGE_MULTIPLIER etc.
        # if the key string itself is stored here.
        # Alternatively, InstantShotBowAbility directly tags the arrow using fixed NBTService keys.
        # The current ToolInteractionListener transfers PROJECTILE_DAMAGE_MULTIPLIER and TRUE_DAMAGE_FLAG_KEY if on bow.
        # For example, if this bow should grant a damage multiplier to its arrows:
        # "mmoc_projectile_damage_multiplier": 2 # This would need custom NBT key string matching in ItemService
        # Or, more simply, the CombatService checks the bow's ITEM_ID_KEY on the projectile (if tagged)
        # and applies special bow properties.


  # --- Example for Compactor (Part 4) ---
  personal_compactor_4000:
    material: HOPPER # Or any other material
    name: "&6Personal Compactor 4000"
    lore:
      - "&7Automatically compacts materials"
      - "&7from your inventory into their"
      - "&7more compressed forms!"
      - ""
      - "&eSlots: &a3"
      - "&eRight-click to configure filters."
    unbreakable: true
    # No custom_stats or attributes needed unless you want them
    # The behavior is driven by NBT set by the plugin when crafting/giving this item
    # and by the CompactorService.
    # ItemService will need to add COMPACTOR_UTILITY_ID_KEY and COMPACTOR_SLOT_COUNT_KEY
    # to the item when createItemStack is called for this ID.
    # This will be handled in ItemService's createItemStack by checking the item ID.