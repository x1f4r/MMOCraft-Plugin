name: mmocraft
version: '1.0-SNAPSHOT' # Enclose version in quotes if it contains non-numeric, though SNAPSHOT is usually fine
main: io.github.x1f4r.mmocraft.MMOCraft
api-version: '1.20'
authors: [x1f4r]
description: Custom items, recipes, and mobs with a unique crafting system.

commands:
  customcraft:
    description: Opens the custom MMO crafting GUI.
    usage: /<command>
    aliases: [mcraft, mmoc] # Aliases seen in your screenshot

  summonelderdragon:
    description: Summons a powerful Elder Dragon.
    usage: /<command>
    permission: mmocraft.command.summon.elderdragon
    permission-message: You do not have permission to summon the Elder Dragon.

  givecustomitem: # This is the command name the server will recognize
    description: Gives a custom item from MMOCraft.
    usage: /<command> <item_id> [amount] [player]
    aliases: [mmogive, mcgive] # These are alternative ways to type the command
    permission: mmocraft.command.givecustomitem
    permission-message: You do not have permission to use this command.

  stats:
    description: Displays your current MMOCraft stats.
    usage: /<command>
    aliases: [mystats, mmostats] # Aliases seen in your screenshot
    permission: mmocraft.command.stats
    permission-message: You do not have permission to view your stats.

permissions:
  mmocraft.command.craft:
    description: Allows usage of the /customcraft command.
    default: true
  mmocraft.command.summon.elderdragon:
    description: Allows summoning the Elder Dragon.
    default: op
  mmocraft.command.givecustomitem:
    description: Allows usage of the /givecustomitem command.
    default: op
  mmocraft.command.stats:
    description: Allows players to view their own MMOCraft stats.
    default: true