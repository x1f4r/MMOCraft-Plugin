name: MMOCraft
version: '1.1-REFACTORED'
main: io.github.x1f4r.mmocraft.core.MMOPlugin
api-version: '1.20'
authors: [x1f4r]
description: Refactored MMO Engine.

commands:
  customcraft:
    description: Opens the custom MMO crafting GUI.
    usage: /<command>
    aliases: [mcraft, mmoc]
    permission: mmocraft.command.craft
  summonelderdragon:
    description: Summons a powerful Elder Dragon.
    usage: /<command>
    permission: mmocraft.command.summon.elderdragon
  givecustomitem:
    description: Gives a custom item from MMOCraft.
    usage: /<command> <item_id> [amount] [player]
    aliases: [mmogive, mcgive]
    permission: mmocraft.command.givecustomitem
  stats:
    description: Displays your current MMOCraft stats.
    usage: /<command>
    aliases: [mystats, mmostats]
    permission: mmocraft.command.stats
  reloadmobs:
    description: Reloads the mobs.yml configuration.
    usage: /<command>
    permission: mmocraft.command.reloadmobs
  mmoadmin:
    description: Admin commands for managing MMOCraft player stats.
    usage: |
      /<command> stat health current <set|add|remove> <player> <amount>
      /<command> stat health max <set|add|remove> <player> <amount>
      /<command> stat mana current <set|add|remove> <player> <amount>
      /<command> stat mana max <set|add|remove> <player> <amount>
    permission: mmocraft.command.adminstats

permissions:
  mmocraft.command.craft: {default: true}
  mmocraft.command.summon.elderdragon: {default: op}
  mmocraft.command.givecustomitem: {default: op}
  mmocraft.command.stats: {default: true}
  mmocraft.command.reloadmobs: {default: op}
  mmocraft.command.adminstats: {default: op}

