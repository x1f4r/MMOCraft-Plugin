# List of custom recipes
recipes:
  # --- Tree Items ---
  tree_sword:
    type: SHAPED
    result: { item_id: tree_sword }
    shape: [ " L ", " L ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_pickaxe:
    type: SHAPED
    result: { item_id: tree_pickaxe }
    shape: [ "LLL", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_axe:
    type: SHAPED
    result: { item_id: tree_axe }
    shape: [ "LL ", "LS ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_shovel:
    type: SHAPED
    result: { item_id: tree_shovel }
    shape: [ " L ", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_hoe:
    type: SHAPED
    result: { item_id: tree_hoe }
    shape: [ "LL ", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_helmet:
    type: SHAPED
    result: { item_id: tree_helmet }
    shape: [ "LLL", "L L" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
  tree_chestplate:
    type: SHAPED
    result: { item_id: tree_chestplate }
    shape: [ "L L", "LLL", "LLL" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
  tree_leggings:
    type: SHAPED
    result: { item_id: tree_leggings }
    shape: [ "LLL", "L L", "L L" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
  tree_boots:
    type: SHAPED
    result: { item_id: tree_boots }
    shape: [ "L L", "L L" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }

  aspect_of_the_end:
    type: SHAPED
    result: { item_id: aspect_of_the_end }
    shape:
      - "PEP"
      - "ESE"
      - " S "
    ingredients:
      P: { type: MATERIAL, value: ENDER_PEARL, amount: 8 }
      E: { type: MATERIAL, value: END_STONE, amount: 16 }
      S: { type: MATERIAL, value: NETHERITE_INGOT, amount: 1 }

  tree_bow:
    type: SHAPED
    result: { item_id: tree_bow }
    shape:
      - " SL"
      - "S L"
      - " SL"
    ingredients:
      S: { type: MATERIAL, value: STRING, amount: 64 }
      L: { type: TAG, value: LOGS, amount: 64 }

