# List of custom recipes
recipes:
  # --- Tree Items ---
  tree_sword:
    type: SHAPED
    result: { item_id: tree_sword }
    shape: [ " L ", " L ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_pickaxe:
    type: SHAPED
    result: { item_id: tree_pickaxe }
    shape: [ "LLL", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_axe:
    type: SHAPED
    result: { item_id: tree_axe }
    shape: [ "LL ", "LS ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_shovel:
    type: SHAPED
    result: { item_id: tree_shovel }
    shape: [ " L ", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_hoe:
    type: SHAPED
    result: { item_id: tree_hoe }
    shape: [ "LL ", " S ", " S " ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
      S: { type: MATERIAL, value: STICK, amount: 1 }
  tree_helmet:
    type: SHAPED
    result: { item_id: tree_helmet }
    shape: [ "LLL", "L L" ] # Removed empty third row for compactness
    ingredients:
      L: { type: TAG, value: LOGS, amount: 32 } # Reduced amount for helmet
  tree_chestplate:
    type: SHAPED
    result: { item_id: tree_chestplate }
    shape: [ "L L", "LLL", "LLL" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
  tree_leggings:
    type: SHAPED
    result: { item_id: tree_leggings }
    shape: [ "LLL", "L L", "L L" ]
    ingredients:
      L: { type: TAG, value: LOGS, amount: 64 }
  tree_boots:
    type: SHAPED
    result: { item_id: tree_boots }
    shape: [ "L L", "L L" ] # Removed empty first row
    ingredients:
      L: { type: TAG, value: LOGS, amount: 32 } # Reduced amount for boots

  # --- Aspect of the End Recipe (Example) ---
  aspect_of_the_end:
    type: SHAPED
    result: { item_id: aspect_of_the_end }
    shape:
      - "PEP"
      - "ESE"
      - " S "
    ingredients:
      P: { type: MATERIAL, value: ENDER_PEARL, amount: 8 } # Needs 8 pearls per slot
      E: { type: MATERIAL, value: END_STONE, amount: 16 }  # Needs 16 end stone per slot
      S: { type: MATERIAL, value: NETHERITE_INGOT, amount: 1 } # Or DIAMOND, or STICK